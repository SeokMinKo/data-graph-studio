name: Quality Gate

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  ruff-changed-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (changed Python files)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
          else
            BASE="HEAD~1"
          fi

          CHANGED=$(git diff --name-only "$BASE"...HEAD | grep -E '\.py$' || true)

          if [[ -z "$CHANGED" ]]; then
            echo "No changed Python files."
            exit 0
          fi

          echo "Changed Python files:"
          echo "$CHANGED"
          ruff check $CHANGED

      - name: Regenerate changelog-test index docs
        run: |
          set -euo pipefail
          python scripts/generate_changelog_test_index.py

      - name: Ensure generated docs are up-to-date
        run: |
          set -euo pipefail
          if ! git diff --quiet -- docs/changelog-test-index.md docs/changelog-manual-mapping-priority.md; then
            echo "Generated changelog index docs are stale. Run: python scripts/generate_changelog_test_index.py"
            git --no-pager diff -- docs/changelog-test-index.md docs/changelog-manual-mapping-priority.md
            exit 1
          fi
