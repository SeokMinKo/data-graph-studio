name: Windows Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: ver
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF}" -replace "refs/tags/", ""
          $ver = $tag.TrimStart('v')
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "ver=$ver" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject build version
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.ver }}"
          "__version__ = `"$ver`"" | Out-File -Encoding utf8 data_graph_studio\_build_version.py

      - name: Build (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller dgs.spec --noconfirm --clean

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.ver }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\installer\DataGraphStudio.iss /DMyAppVersion=$ver

      - name: Generate checksums
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist_installer\*.exe | Select-Object -First 1
          if (-not $exe) { throw "Installer exe not found" }
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          $out = "$hash  $($exe.Name)"
          $shaPath = Join-Path $exe.DirectoryName ("$($exe.BaseName).sha256")
          $out | Out-File -Encoding ascii $shaPath

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            dist_installer/*.exe
            dist_installer/*.sha256
